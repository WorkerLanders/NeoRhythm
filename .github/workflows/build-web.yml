name: Build and Deploy Web

on:
  push:
    branches:
      - master
      - claude/godot-web-build-export-2oftqs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Export Godot Web Build
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.2.stable
          cp -r /root/templates/* /root/.local/share/godot/export_templates/4.2.stable/

      - name: Create build output directory
        run: mkdir -p build/web

      - name: Export project
        run: godot --headless --export-release "Web" ./build/web/index.html

      - name: Download coi-serviceworker
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js \
            -o build/web/coi-serviceworker.js

      - name: Inject coi-serviceworker into index.html
        run: |
          sed -i 's|<head>|<head>\n  <script src="coi-serviceworker.js"></script>|' \
            build/web/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
